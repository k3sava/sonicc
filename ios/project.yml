# XcodeGen spec — run `xcodegen generate` to rebuild Sonicc.xcodeproj
# from this file when the source tree changes.
#
# install: `brew install xcodegen`
name: Sonicc
options:
  bundleIdPrefix: app.sonicc
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Sonicc:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sonicc
        excludes:
          - "Info.plist"
          - "Sonicc.entitlements"
    settings:
      base:
        PRODUCT_NAME: Sonicc
        PRODUCT_BUNDLE_IDENTIFIER: app.sonicc.Sonicc
        INFOPLIST_FILE: Sonicc/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sonicc/Sonicc.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: Sonicc/Info.plist
    dependencies: []
